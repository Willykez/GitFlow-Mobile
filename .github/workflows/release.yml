name: Build signed release APK

# Runs when you push a version tag (e.g. "v1.0.0"), or manually from the
# Actions tab any time ("Run workflow" button) — useful while you're still
# testing changes and don't want to tag a release yet.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write   # needed to attach the APK to a GitHub Release on a tag push

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # Installs a real Gradle 8.7 and puts a `gradle` command on PATH.
      # This project intentionally doesn't rely on `./gradlew` in CI — the
      # binary gradle-wrapper.jar that ships with a normal Gradle project
      # isn't checked into this repo (see README), so every step below calls
      # `gradle` directly instead. Locally in Android Studio this doesn't
      # matter: Android Studio regenerates the wrapper jar itself on sync.
      - name: Set up Gradle 8.7
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.7"

      # ----------------------------------------------------------------
      # Signing keystore.
      #
      # If RELEASE_KEYSTORE_BASE64 is set as a repo secret, this decodes and
      # uses that real, persistent keystore — every build is signed with the
      # same key, so updates install in place and (eventually) this could
      # ship to the Play Store.
      #
      # If that secret isn't set yet, this falls back to generating a
      # throwaway keystore instead, same as before: fine for installing on
      # your own device(s), but a fresh random key every run means you can't
      # update in place across runs, and it could never go to the Play
      # Store. See README.md → "Signing" for how to generate and add the
      # real keystore secret.
      # ----------------------------------------------------------------
      - name: Set up signing keystore
        id: keystore
        env:
          HAS_PERSISTENT_KEYSTORE: ${{ secrets.RELEASE_KEYSTORE_BASE64 != '' }}
        run: |
          KEYSTORE_PATH="$RUNNER_TEMP/gitflowmobile-release.keystore"

          if [ "$HAS_PERSISTENT_KEYSTORE" = "true" ]; then
            echo "Using persistent keystore from repo secrets."
            echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 -d > "$KEYSTORE_PATH"
            KEYSTORE_PASSWORD="${{ secrets.RELEASE_KEYSTORE_PASSWORD }}"
            KEY_ALIAS="${{ secrets.RELEASE_KEY_ALIAS }}"
          else
            echo "::warning::No RELEASE_KEYSTORE_BASE64 secret found — signing with a throwaway keystore. This build won't be able to update in place over a previous install signed the same way, and can't go to the Play Store. See README.md → Signing."
            # NOTE: modern `keytool` defaults to a PKCS12 keystore, and PKCS12
            # requires the store password and key password to be IDENTICAL —
            # using two different random passwords here causes a confusing
            # "Given final block not properly padded" error later, when the
            # build tries to open the key with a different password than the
            # store was encrypted with. So: one password, used for both.
            KEYSTORE_PASSWORD=$(openssl rand -hex 16)
            KEY_ALIAS="gitflowmobile"
            keytool -genkeypair \
              -v \
              -storetype PKCS12 \
              -keystore "$KEYSTORE_PATH" \
              -alias "$KEY_ALIAS" \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -storepass "$KEYSTORE_PASSWORD" \
              -keypass "$KEYSTORE_PASSWORD" \
              -dname "CN=GitFlowMobile, OU=GitFlowMobile, O=GitFlowMobile, L=Unknown, S=Unknown, C=TZ"
          fi

          # Mask the password in logs, then hand it to later steps.
          echo "::add-mask::$KEYSTORE_PASSWORD"
          echo "keystore_password=$KEYSTORE_PASSWORD" >> "$GITHUB_OUTPUT"
          echo "keystore_path=$KEYSTORE_PATH" >> "$GITHUB_OUTPUT"
          echo "key_alias=$KEY_ALIAS" >> "$GITHUB_OUTPUT"

      - name: Build release APK (shrunk + signed)
        run: |
          gradle assembleRelease \
            -PGITFLOWMOBILE_RELEASE_STORE_FILE="${{ steps.keystore.outputs.keystore_path }}" \
            -PGITFLOWMOBILE_RELEASE_STORE_PASSWORD="${{ steps.keystore.outputs.keystore_password }}" \
            -PGITFLOWMOBILE_RELEASE_KEY_ALIAS="${{ steps.keystore.outputs.key_alias }}" \
            -PGITFLOWMOBILE_RELEASE_KEY_PASSWORD="${{ steps.keystore.outputs.keystore_password }}" \
            --no-daemon

      - name: Locate the built APK
        id: apk
        run: |
          APK_PATH=$(find app/build/outputs/apk/release -name "*.apk" | head -n1)
          echo "Found: $APK_PATH"
          echo "path=$APK_PATH" >> "$GITHUB_OUTPUT"

      - name: Upload APK as a workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: gitflowmobile-release-apk
          path: ${{ steps.apk.outputs.path }}
          retention-days: 30

      # Only runs when this workflow was triggered by pushing a tag like
      # "v1.0.0" — attaches the APK directly to a GitHub Release so you (or
      # anyone) can download it straight from the repo's Releases page,
      # without digging through workflow run artifacts.
      - name: Create GitHub Release with APK attached
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.apk.outputs.path }}
          generate_release_notes: true