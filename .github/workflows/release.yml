name: Build signed release APK

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle 8.7
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.7"

      - name: Set up signing keystore
        id: keystore
        env:
          HAS_PERSISTENT_KEYSTORE: ${{ secrets.KEYSTORE_B64 != '' }}
        run: |
          KEYSTORE_PATH="$RUNNER_TEMP/gitflowmobile-release.keystore"

          if [ "$HAS_PERSISTENT_KEYSTORE" = "true" ]; then
            echo "Using persistent keystore from repo secrets."

            echo "${{ secrets.KEYSTORE_B64 }}" | base64 -d > "$KEYSTORE_PATH"

            KEYSTORE_PASSWORD="${{ secrets.STORE_PASSWORD }}"
            KEY_ALIAS="${{ secrets.KEY_ALIAS }}"
            KEY_PASSWORD="${{ secrets.KEY_PASSWORD }}"

          else
            echo "::warning::No KEYSTORE_B64 secret found — generating temporary keystore."

            KEYSTORE_PASSWORD=$(openssl rand -hex 16)
            KEY_PASSWORD="$KEYSTORE_PASSWORD"
            KEY_ALIAS="upload"

            keytool -genkeypair \
              -v \
              -storetype PKCS12 \
              -keystore "$KEYSTORE_PATH" \
              -alias "$KEY_ALIAS" \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -storepass "$KEYSTORE_PASSWORD" \
              -keypass "$KEY_PASSWORD" \
              -dname "CN=GitFlowMobile, OU=GitFlowMobile, O=GitFlowMobile, L=Unknown, S=Unknown, C=TZ"
          fi

          echo "::add-mask::$KEYSTORE_PASSWORD"
          echo "::add-mask::$KEY_PASSWORD"

          echo "keystore_password=$KEYSTORE_PASSWORD" >> "$GITHUB_OUTPUT"
          echo "key_password=$KEY_PASSWORD" >> "$GITHUB_OUTPUT"
          echo "keystore_path=$KEYSTORE_PATH" >> "$GITHUB_OUTPUT"
          echo "key_alias=$KEY_ALIAS" >> "$GITHUB_OUTPUT"

      - name: Build release APK (shrunk + signed)
        run: |
          gradle assembleRelease \
            -PGITFLOWMOBILE_RELEASE_STORE_FILE="${{ steps.keystore.outputs.keystore_path }}" \
            -PGITFLOWMOBILE_RELEASE_STORE_PASSWORD="${{ steps.keystore.outputs.keystore_password }}" \
            -PGITFLOWMOBILE_RELEASE_KEY_ALIAS="${{ steps.keystore.outputs.key_alias }}" \
            -PGITFLOWMOBILE_RELEASE_KEY_PASSWORD="${{ steps.keystore.outputs.key_password }}" \
            --no-daemon

      - name: Locate the built APK
        id: apk
        run: |
          APK_PATH=$(find app/build/outputs/apk/release -name "*.apk" | head -n1)

          if [ -z "$APK_PATH" ]; then
            echo "No APK found!"
            exit 1
          fi

          echo "Found APK: $APK_PATH"

          echo "path=$APK_PATH" >> "$GITHUB_OUTPUT"

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: gitflowmobile-release-apk
          path: ${{ steps.apk.outputs.path }}
          retention-days: 30

      - name: Create GitHub Release with APK attached
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.apk.outputs.path }}
          generate_release_notes: true
